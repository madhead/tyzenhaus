name: 'Setup Mini App'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version-file: 'mini-app/.node-version'
        cache: 'yarn'
        cache-dependency-path: 'mini-app/yarn.lock'

    - run: yarn install --immutable
      shell: bash
      working-directory: mini-app
