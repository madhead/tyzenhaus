name: Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-mini-app:
    name: Lint Mini App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: 'mini-app/.node-version'
          cache: 'yarn'
          cache-dependency-path: 'mini-app/yarn.lock'
      - run: yarn install --immutable
        working-directory: mini-app
      - run: yarn run lint
        working-directory: mini-app

  format-mini-app:
    name: Format Mini App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: 'mini-app/.node-version'
          cache: 'yarn'
          cache-dependency-path: 'mini-app/yarn.lock'
      - run: yarn install --immutable
        working-directory: mini-app
      - run: yarn run format:check
        working-directory: mini-app

  typecheck-mini-app:
    name: Typecheck Mini App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: 'mini-app/.node-version'
          cache: 'yarn'
          cache-dependency-path: 'mini-app/yarn.lock'
      - run: yarn install --immutable
        working-directory: mini-app
      - run: yarn run typecheck
        working-directory: mini-app

  test-mini-app:
    name: Test Mini App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: 'mini-app/.node-version'
          cache: 'yarn'
          cache-dependency-path: 'mini-app/yarn.lock'
      - run: yarn install --immutable
        working-directory: mini-app
      - run: yarn run test:coverage
        working-directory: mini-app
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: mini-app-test-results
          retention-days: 1
          path: |
            mini-app/build/coverage
            mini-app/build/test-results

  test-unit:
    name: Unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - run: ./gradlew check jacocoTestReport
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: unit-test-results
          retention-days: 1
          path: |
            **/build/reports
            **/build/test-results
            **/build/jacoco

  test-db:
    name: DB test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - run: ./gradlew dbTest jacocoDbTestReport
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: db-test-results
          retention-days: 1
          path: |
            **/build/reports
            **/build/test-results
            **/build/jacoco

  test-publish:
    name: Publish test results
    runs-on: ubuntu-latest
    needs:
      - test-unit
      - test-db
      - test-mini-app
    if: ${{ !cancelled() }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: unit-test-results
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: db-test-results
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: mini-app-test-results
          path: mini-app/build
      - uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16
        with:
          report_paths: '**/test-results/**/TEST-*.xml'
      - uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16
        with:
          check_name: 'Mini App test results'
          report_paths: 'mini-app/build/test-results/junit.xml'

  codecov:
    name: CodeCov
    runs-on: ubuntu-latest
    needs:
      - test-unit
      - test-db
      - test-mini-app
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: unit-test-results
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: db-test-results
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: mini-app-test-results
          path: mini-app/build
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: mini-app
          files: 'mini-app/build/coverage/lcov.info'
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: '**/test-results/**/TEST-*.xml'
