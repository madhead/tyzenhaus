name: Default

on:
  push:
    branches-ignore:
      - master
      - crowdin

jobs:
  check-gradle-version:
    name: Check Gradle version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: madhead/check-gradle-version@v1
    continue-on-error: true

  build-policies:
    name: Build policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - run: ./gradlew :policies:privacy
      - run: tar -cvf policies.tar policies/build
      - uses: actions/upload-artifact@v4
        with:
          name: policies
          path: |
            policies.tar

  unit-test:
    name: Unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - run: ./gradlew check jacocoTestReport
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          retention-days: 1
          path: |
            **/build/reports
            **/build/test-results
            **/build/jacoco

  db-test:
    name: DB test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - run: ./gradlew dbTest jacocoDbTestReport
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: db-test-results
          retention-days: 1
          path: |
            **/build/reports
            **/build/test-results
            **/build/jacoco

  mini-app-test:
    name: Mini App test
    runs-on: ubuntu-latest
    needs:
      - build-policies
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'mini-app/.nvmrc'
      - run: yarn install
        working-directory: mini-app
      - uses: actions/download-artifact@v4
        with:
          name: policies
      - run: |
          tar xvf policies.tar
      - run: yarn run build
        working-directory: mini-app

  test-publish:
    name: Publish test results
    runs-on: ubuntu-latest
    needs:
      - unit-test
      - db-test
      - mini-app-test
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: unit-test-results
      - uses: actions/download-artifact@v4
        with:
          name: db-test-results
      - uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/test-results/**/TEST-*.xml'

  codecov:
    name: CodeCov
    runs-on: ubuntu-latest
    needs:
      - unit-test
      - db-test
      - mini-app-test
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: unit-test-results
      - uses: actions/download-artifact@v4
        with:
          name: db-test-results
      - run: bash <(curl -s https://codecov.io/bash)
