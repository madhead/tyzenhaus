name: Default

on:
  push:
    branches-ignore:
      - master
      - crowdin

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml
    secrets: inherit
    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - uses: ./.github/actions/setup-jvm

      - run: ./gradlew :policies:privacy :launcher:fly:installDist

      - uses: ./.github/actions/setup-mini-app

      - run: yarn run build
        working-directory: mini-app
